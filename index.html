<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vrei să ieșim?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container" id="main-container">
    <h1 id="question">Vrei să ieșim la o cafea/suc? 😊</h1>

    <div class="buttons" id="btn-group">
        <button id="yes-btn">DA</button>
        <button id="no-btn">NU</button>
    </div>

    <div id="date-panel">
        <h3>Super! Alege o zi ❤️</h3>
        <input type="date" id="calendar">
        <br>
        <button id="confirm-btn">Confirmă</button>
    </div>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
