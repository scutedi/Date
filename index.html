<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cum a fost la date?</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container" id="main-container">
    <div id="step-rating">
        <h1 id="question">Ce notă dai la acest date? 😊</h1>
        <div class="stars" id="stars-container">
            <span class="star" data-value="1">★</span>
            <span class="star" data-value="2">★</span>
            <span class="star" data-value="3">★</span>
            <span class="star" data-value="4">★</span>
            <span class="star" data-value="5">★</span>
        </div>
        <button id="next-btn" disabled>Continuă</button>
    </div>

    <div id="step-question" style="display: none;">
        <h1>Ai vrea să mai ieșim la un date? 🤔</h1>
        <div class="buttons" id="btn-group">
            <button id="yes-btn">Da</button>
            <button id="no-btn">Nu</button>
        </div>
    </div>

    <div id="date-panel" style="display: none;">
        <h1>Super! Alege o zi ❤️</h1>

        <div class="input-wrapper">
            <input type="text" id="calendar" readonly />
        </div>

        <br>
        <button id="confirm-btn">Confirmă</button>
    </div>

    <div id="custom-alert" class="custom-alert-overlay" style="display: none;">
        <div class="custom-alert-box">
            <span id="custom-alert-close" class="close-x">&times;</span>
            <div class="custom-alert-icon">❤️</div>
            <h2 id="custom-alert-title">Super!</h2>
            <p id="custom-alert-message">Mesaj de confirmare...</p>
        </div>
    </div>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
